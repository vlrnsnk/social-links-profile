<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Links Profile</title>
  <meta name="description" content="Social Links Profile">
  <link rel="icon" type="image/png" href="/images/favicons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/images/favicons/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/images/favicons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Social Links Profile" />
  <link rel="manifest" href="/images/favicons/site.webmanifest" />
  <link rel="stylesheet" href="/src/scss/main.scss">
</head>
  <body>
    <main class="main">
      <h1 class="visually-hidden">Social Links Profile</h1>

      <article class="profile">
        <header class="profile__header">
          <figure class="profile__figure">
            <img
              class="profile__avatar"
              src="/src/assets/images/avatar-jessica.jpeg"
              width="88"
              height="88"
              alt="Jessica Randall"
            />
          </figure>

          <div class="profile__meta">
            <h2 class="profile__name">Jessica Randall</h2>
            <p class="profile__location">London, United Kingdom</p>
          </div>
          <p class="profile__description">"Front-end developer and avid reader."</p>
        </header>

        <nav class="profile__nav" aria-label="Jessica Randall's social media profiles">
          <ul class="profile__list">
            <li class="profile__item">
              <a class="profile__link" href="https://github.com/" target="_blank" rel="noopener noreferrer">
                GitHub <span class="visually-hidden">opens in a new tab</span>
              </a>
            </li>
            <li class="profile__item">
              <a class="profile__link" href="https://www.frontendmentor.io/" target="_blank" rel="noopener noreferrer">
                Frontend Mentor <span class="visually-hidden">opens in a new tab</span>
              </a>
            </li>
            <li class="profile__item">
              <a class="profile__link" href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer">
                LinkedIn <span class="visually-hidden">opens in a new tab</span>
              </a>
            </li>
            <li class="profile__item">
              <a class="profile__link" href="https://twitter.com/" target="_blank" rel="noopener noreferrer">
                Twitter <span class="visually-hidden">opens in a new tab</span>
              </a>
            </li>
            <li class="profile__item">
              <a class="profile__link" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">
                Instagram <span class="visually-hidden">opens in a new tab</span>
              </a>
            </li>
          </ul>
        </nav>
      </article>

    </main>
  </body>
</html>
